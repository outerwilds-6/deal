<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStation 后台管理</title>
    <link rel="stylesheet" href="/static/css/backend.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <h1>SmartStation 后台管理</h1>
    </header>

    <div class="layout">
        <!-- 侧边栏 -->
        <nav class="sidebar">
            <ul>
                <li class="nav-item active" data-view="users">用户管理</li>
                <li class="nav-item" data-view="parcels">包裹看板</li>
                <li class="nav-item" data-view="logs">出入日志</li>
            </ul>
        </nav>

        <!-- 内容区 -->
        <main class="content">
            <!-- 全局通知 -->
            <div id="toast" class="toast hidden"></div>

            <!-- ==================== 用户管理视图 ==================== -->
            <section id="view-users" class="view active">
                <div class="card">
                    <div class="card-header">
                        <h2>用户管理</h2>
                        <button id="btn-add-user" class="btn btn-primary">+ 注册新用户</button>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>姓名</th>
                                    <th>手机号</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody">
                                <tr class="table-placeholder"><td colspan="6">加载中...</td></tr>
                            </tbody>
                        </table>
                        <div class="pagination" id="users-pagination">
                            <button id="users-prev" disabled>上一页</button>
                            <span id="users-page-info">第 1 页</span>
                            <button id="users-next">下一页</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ==================== 包裹看板视图 ==================== -->
            <section id="view-parcels" class="view">
                <div class="card">
                    <div class="card-header">
                        <h2>包裹看板</h2>
                        <div class="filter-bar">
                            <button class="filter-btn active" data-status="">全部</button>
                            <button class="filter-btn" data-status="1">在库</button>
                            <button class="filter-btn" data-status="2">已取件</button>
                            <button class="filter-btn" data-status="3">异常</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="parcels-table">
                            <thead>
                                <tr>
                                    <th>快递单号</th>
                                    <th>快递公司</th>
                                    <th>收件人</th>
                                    <th>手机号</th>
                                    <th>取件码</th>
                                    <th>状态</th>
                                    <th>入库时间</th>
                                </tr>
                            </thead>
                            <tbody id="parcels-tbody">
                                <tr class="table-placeholder"><td colspan="7">加载中...</td></tr>
                            </tbody>
                        </table>
                        <div class="pagination" id="parcels-pagination">
                            <button id="parcels-prev" disabled>上一页</button>
                            <span id="parcels-page-info">第 1 页</span>
                            <button id="parcels-next">下一页</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ==================== 出入日志视图 ==================== -->
            <section id="view-logs" class="view">
                <div class="card">
                    <div class="card-header">
                        <h2>出入日志</h2>
                        <div class="filter-bar">
                            <button class="filter-btn active" data-action="">全部</button>
                            <button class="filter-btn" data-action="IN">进门</button>
                            <button class="filter-btn" data-action="OUT">出门</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="logs-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>动作</th>
                                    <th>时间</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody id="logs-tbody">
                                <tr class="table-placeholder"><td colspan="4">加载中...</td></tr>
                            </tbody>
                        </table>
                        <div class="pagination" id="logs-pagination">
                            <button id="logs-prev" disabled>上一页</button>
                            <span id="logs-page-info">第 1 页</span>
                            <button id="logs-next">下一页</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ==================== 模态框：注册/编辑用户 ==================== -->
    <div id="modal-user" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-user-title">注册新用户</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-user" novalidate>
                <input type="hidden" id="user-id" value="">
                <div class="form-group">
                    <label for="user-name">姓名 *</label>
                    <input type="text" id="user-name" placeholder="请输入姓名" required>
                </div>
                <div class="form-group">
                    <label for="user-phone">手机号 *</label>
                    <input type="text" id="user-phone" placeholder="13800138000" pattern="1[3-9]\d{9}" required>
                </div>
                <div class="form-group" id="photo-group">
                    <label for="user-photo">人脸照片 *</label>
                    <input type="file" id="user-photo" accept="image/*">
                    <img id="photo-preview" class="photo-preview hidden" alt="预览">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary modal-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== 模态框：确认操作 ==================== -->
    <div id="modal-confirm" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>确认操作</h3>
                <button class="modal-close">&times;</button>
            </div>
            <p id="confirm-message"></p>
            <div class="form-actions">
                <button class="btn btn-secondary modal-cancel">取消</button>
                <button id="confirm-ok" class="btn btn-danger">确认</button>
            </div>
        </div>
    </div>

    <script src="/static/js/backend.js"></script>
</body>
</html>
