<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStation - 客户体验端</title>
    <link rel="stylesheet" href="/static/css/client.css">
</head>
<body>
    <!-- 整体布局 -->
    <div id="container">

        <!-- 左侧：摄像头 -->
        <div id="camera-panel">
            <div class="camera-header">
                <span class="camera-dot"></span>
                实时画面
            </div>
            <div class="camera-body">
                <img id="video-feed" src="/api/client/video_feed" alt="Camera Feed">
            </div>
        </div>

        <!-- 右侧：交互区域 -->
        <div id="interact-panel">

            <!-- 标题 -->
            <div id="brand">
                <h1>SmartStation</h1>
                <p>智能无人驿站 · 客户体验端</p>
            </div>

            <!-- ====== 状态：待机 (Idle) ====== -->
            <div id="state-idle" class="state-view">
                <div class="card">
                    <div class="card-icon">&#x1F6AA;</div>
                    <h2>欢迎光临</h2>
                    <p>请正对摄像头后点击按钮进行人脸验证</p>
                    <button id="btn-entry" class="btn btn-primary btn-large">刷脸进门</button>
                </div>
            </div>

            <!-- ====== 状态：站内 (Inside) ====== -->
            <div id="state-inside" class="state-view" style="display:none;">

                <!-- 用户信息 -->
                <div class="card user-info-card">
                    <div class="user-row">
                        <div class="user-avatar">&#x1F464;</div>
                        <div class="user-detail">
                            <span class="user-name" id="user-name">--</span>
                            <span class="user-phone" id="user-phone">--</span>
                        </div>
                    </div>
                </div>

                <!-- 包裹列表 -->
                <div class="card parcel-list-card">
                    <div class="card-title">
                        <span>&#x1F4E6;</span> 在库包裹
                    </div>
                    <div class="parcel-scroll">
                        <div id="parcels-list"></div>
                        <p id="no-parcels" style="display:none;">暂无在库包裹</p>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-row">
                    <button id="btn-pickup" class="btn btn-primary btn-large">扫码取件</button>
                    <button id="btn-exit" class="btn btn-outline btn-large">刷脸出门</button>
                </div>
            </div>
        </div>

        <!-- ====== 取件弹窗 ====== -->
        <div id="pickup-modal" style="display:none;">
            <div class="modal-card">
                <h3 id="pickup-title">正在扫描...</h3>
                <p id="pickup-message">请将包裹二维码对准摄像头</p>
                <div id="pickup-loading" class="spinner"></div>
                <button id="btn-close-pickup" class="btn btn-outline" style="display:none;">关闭</button>
            </div>
        </div>

        <!-- ====== 通知横幅 ====== -->
        <div id="notification" class="notification"></div>

    </div>

    <script src="/static/js/client.js"></script>
</body>
</html>
